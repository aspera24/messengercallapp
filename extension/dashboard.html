<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetFlow</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="dashboard-tab-mob.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="data:,">
    <script src="js/jquery-4.0.0.min.js"></script>
    <script src="js/dataTables.min.js"></script>
</head>

<body>
    <div id="overlay"></div>
    <div class="app">

        <!-- TOP BAR -->
        <div class="topbar">
            <button id="menuBtn">
                <i class="fa-solid fa-bars"></i>
            </button>
            <h2>
                <div class="logo">
                    MF
                </div>
                MeetFlow
            </h2>
            <h3 id="uname">User Name</h3>
        </div>

        <div class="centCont">
            <div class="leftCont">
                <!-- VIDEO GRID -->
                <div class="leftInnerCont">
                    <canvas id="effectCanvas" style="display:none"></canvas>
                    <div class="video-grid">

                        <div class="video-box" id="localBox">

                            <div class="video-loading" id="localLoading">
                                <i class="fa-solid fa-video fa-beat-fade"></i>
                                <span>Connecting Camera...</span>
                            </div>

                            <video id="local" autoplay muted playsinline></video>

                            <div class="video-status" id="localStatus">
                                <i class="fa-solid fa-user"></i>
                                <span id="statusText">Camera Off</span>
                            </div>

                            <span class="tag">You</span>

                            <!-- CONTROLS -->
                            <div class="controls">
                                <button id="camBtn">
                                    <i class="fa-solid fa-video"></i>
                                </button>

                                <button id="micBtn">
                                    <i class="fa-solid fa-microphone"></i>
                                </button>
                            </div>

                            <div class="mic-level">
                                <div class="bar"></div>
                                <div class="bar"></div>
                                <div class="bar"></div>
                                <div class="bar"></div>
                                <div class="bar"></div>
                            </div>
                        </div>
                    </div>

                    <div class="filter-box">

                        <label>Camera Filter</label>

                        <select id="cameraFilter">

                            <option value="">None</option>
                            <option value="Grayscale">Grayscale</option>
                            <option value="Warm">Warm</option>
                            <option value="Cool">Cool</option>
                            <option value="Cinematic">Cinematic</option>

                        </select>

                        <button id="importLutBtn">
                            <i class="fa-solid fa-file-import"></i>
                            Import LUT
                        </button>

                        <input type="file" id="lutFile" accept=".cube" hidden>

                    </div>

                    <div class="userListCont">
                        <button id="endBtn">
                            <i class="fa-solid fa-phone-slash"></i>
                            End Meeting
                        </button>

                        <button id="callAllBtn">
                            <i class="fa-solid fa-phone"></i>
                            Call All
                        </button>

                        <div class="listBar">
                            <h3>Employees</h3>
                            <i id="addEmp" title="Add Employee" class="fa-solid fa-user-plus"></i>
                        </div>

                        <table id="userTable" class="display" style="width:100%">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th width="150">Actions</th>
                                </tr>
                            </thead>

                            <tbody></tbody>
                        </table>
                    </div>

                </div>

                <button class="logoutBtn" id="logoutBtn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Logout
                </button>
            </div>
            <div class="rightCont">
                <div class="videos-container">
                    <p>View all participants' live camera feeds in real time. Active speakers and newly joined
                        participants will appear here during the meeting.</p>
                    <div class="smallVideo">
                        <video id="localPreview" autoplay muted playsinline></video>
                    </div>
                    <div id="videos"></div>
                    <div id="meetingTimer" class="meeting-timer" style="display:none;">
                        <i class="fa-regular fa-clock"></i>
                        <span>00:00:00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="meetingRequestModal" class="meeting-modal">

        <div class="meeting-modal-content">

            <h3>
                <i class="fa-solid fa-video"></i>
                Meeting Invitation
            </h3>

            <p id="meetingRequestText"></p>

            <button id="acceptMeetingBtn">
                Accept
            </button>

            <button id="declineMeetingBtn">
                Decline
            </button>

        </div>

    </div>

    <div id="addEmployeeModal" class="meeting-modal">

        <div class="employee-modal">

            <div class="employee-header">

                <div class="employee-icon">
                    <i class="fa-solid fa-user-plus"></i>
                </div>

                <div>
                    <h2>Add Employee</h2>
                    <p>Create a new employee account.</p>
                </div>

            </div>

            <div class="form-grid">

                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="empFirstname" placeholder="Juan">
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="empLastname" placeholder="Dela Cruz">
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="empUsername" placeholder="juan123">
                </div>

                <div class="form-group">
                    <label>Password</label>

                    <div class="password-field">
                        <input type="password" id="empPassword" placeholder="••••••••">

                        <i id="toggleEmpPassword" class="fa-solid fa-eye">
                        </i>
                    </div>

                </div>

            </div>

            <div class="employee-actions">

                <button id="closeEmployeeModal" class="cancel-btn">
                    <i class="fa-solid fa-xmark"></i>
                    Cancel
                </button>

                <button id="saveEmployeeBtn" class="save-btn">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Save Employee
                </button>

            </div>

        </div>

    </div>

    <script src="socket.io.min.js"></script>
    <script src="js/three.min.js"></script>
    <script src="lut.js"></script>
    <script src="dashboard.js"></script>

</body>

</html>
