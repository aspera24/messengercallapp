<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Messenger Call</title>
    <link rel="stylesheet" href="/style.css">

</head>

<body>

    <div class="container">

        <h3>📞 Messenger Call</h3>

        <!-- SETUP -->
        <input id="myId" placeholder="Enter your ID">

        <button class="primary" id="registerBtn" onclick="register()" disabled>
            Register
        </button>

        <button class="success" onclick="initCamera()">
            Enable Camera & Mic
        </button>

        <hr style="border:1px solid #1e293b;">

        <!-- CALL -->
        <input id="targetId" placeholder="Call User ID">

        <button class="primary" id="callBtn" onclick="call()" disabled>
            📞 Call User
        </button>

        <button class="call-all" onclick="callAll()">
            🔥 Call All Users
        </button>

        <div class="video-grid">

            <div class="video-box">
                <video id="local" autoplay muted playsinline></video>
            </div>

            <div class="video-box">
                <video id="remote" autoplay playsinline></video>
            </div>

        </div>

    </div>

    <!-- INCOMING CALL -->
    <div id="incoming">
        <h3>📲 Incoming Call</h3>
        <button class="success" onclick="acceptCall()">Accept</button>
        <button class="danger" onclick="rejectCall()">Reject</button>
    </div>

    <audio id="ringtone" loop>
        <source src="https://actions.google.com/sounds/v1/alarms/phone_alerts_and_ringtone.ogg">
    </audio>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>

</body>

</html>
