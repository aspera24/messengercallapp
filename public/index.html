<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>MeetFlow</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="data:,">
</head>

<body>

    <div class="app">

        <!-- TOP BAR -->
        <div class="topbar">
            <h2>📞 MeetFlow</h2>

            <div class="actions">
                <button onclick="startMeeting()">
                    Start Meeting
                </button>
            </div>
        </div>

        <!-- VIDEO GRID -->
        <div class="video-grid">

            <div class="video-box" id="localBox">
                <video id="local" autoplay muted></video>

                <span class="tag">You</span>

                <!-- CONTROLS -->
                <div class="controls">
                    <button id="camBtn" onclick="toggleCamera()">
                        <i class="fa-solid fa-video"></i>
                    </button>

                    <button id="micBtn" onclick="toggleMic()">
                        <i class="fa-solid fa-microphone"></i>
                    </button>
                </div>

                <div class="mic-level">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>

            <div id="videos"></div>
        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>

</body>

</html>
