<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>MeetFlow</title>
    <link rel="stylesheet" href="/dashboard.css">
    <link rel="stylesheet" href="/dashboard-tab-mob.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="data:,">
</head>

<body>

    <div class="app">

        <!-- TOP BAR -->
        <div class="topbar">
            <h2>📞 MeetFlow</h2>
            <h3 id="uname">User Name</h3>
            <button onclick="logout()">Logout</button>
        </div>

        <div class="centCont">
            <div class="leftCont">
                <div class="actions">

                    <div class="userListCont">
                        <h3>Employees</h3>
                        <div id="userList"></div>
                    </div>

                    <button id="endBtn" onclick="endMeeting()" style="display:none;background:red;color:white;">
                        End Meeting
                    </button>

                </div>

                <!-- VIDEO GRID -->
                <div class="video-grid">

                    <div class="video-box" id="localBox">

                        <div class="video-loading" id="localLoading">
                            <i class="fa-solid fa-video fa-beat-fade"></i>
                            <span>Connecting Camera...</span>
                        </div>

                        <video id="local" autoplay muted playsinline></video>

                        <div class="video-status" id="localStatus">
                            <i class="fa-solid fa-user"></i>
                            <span id="statusText">Camera Off</span>
                        </div>

                        <span class="tag">You</span>

                        <!-- CONTROLS -->
                        <div class="controls">
                            <button id="camBtn" onclick="toggleCamera()">
                                <i class="fa-solid fa-video"></i>
                            </button>

                            <button id="micBtn" onclick="toggleMic()">
                                <i class="fa-solid fa-microphone"></i>
                            </button>
                        </div>

                        <div class="mic-level">
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                        </div>
                    </div>


                </div>
            </div>
            <div id="videos"></div>
        </div>
    </div>

    <div id="meetingRequestModal" class="meeting-modal">

        <div class="meeting-modal-content">

            <h3>
                <i class="fa-solid fa-video"></i>
                Meeting Invitation
            </h3>

            <p id="meetingRequestText"></p>

            <button id="acceptMeetingBtn">
                Accept
            </button>

            <button id="declineMeetingBtn">
                Decline
            </button>

        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>

</body>

</html>
