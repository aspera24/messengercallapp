<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetFlow</title>
    <link rel="stylesheet" href="/dashboard.css">
    <link rel="stylesheet" href="/dashboard-tab-mob.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="data:,">
</head>

<body>
    <div id="overlay" onclick="toggleSidebar()"></div>
    <div class="app">

        <!-- TOP BAR -->
        <div class="topbar">
            <button id="menuBtn" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars"></i>
            </button>
            <h2>
                <div class="logo">
                    MF
                </div>
                MeetFlow
            </h2>
            <h3 id="uname">User Name</h3>
        </div>

        <div class="centCont">
            <div class="leftCont">
                <!-- VIDEO GRID -->
                <div class="leftInnerCont">
                    <canvas id="effectCanvas" style="display:none"></canvas>
                    <div class="video-grid">
                        <button id="btnCamera">Enable Camera</button>

                        <div class="video-box" id="localBox">

                            <div class="video-loading" id="localLoading">
                                <i class="fa-solid fa-video fa-beat-fade"></i>
                                <span>Connecting Camera...</span>
                            </div>

                            <video id="local" autoplay muted playsinline></video>

                            <div class="video-status" id="localStatus">
                                <i class="fa-solid fa-user"></i>
                                <span id="statusText">Camera Off</span>
                            </div>

                            <span class="tag">You</span>

                            <!-- CONTROLS -->
                            <div class="controls">
                                <button id="camBtn" onclick="toggleCamera()">
                                    <i class="fa-solid fa-video"></i>
                                </button>

                                <button id="micBtn" onclick="toggleMic()">
                                    <i class="fa-solid fa-microphone"></i>
                                </button>
                            </div>

                            <div class="mic-level">
                                <div class="bar"></div>
                                <div class="bar"></div>
                                <div class="bar"></div>
                                <div class="bar"></div>
                                <div class="bar"></div>
                            </div>
                        </div>

                        <button id="endBtn" onclick="endMeeting()">
                            <i class="fa-solid fa-phone-slash"></i>
                            End Meeting
                        </button>
                    </div>


                    <div class="userListCont">
                        <div class="listBar">
                            <h3>Employees</h3>
                            <button><i class="fa-solid fa-plus"></i></button>
                        </div>
                        <div id="userList"></div>
                    </div>

                </div>

                <button onclick="logout()">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Logout
                </button>
            </div>
            <div class="rightCont">
                <div id="videos"></div>
                <div id="meetingTimer" class="meeting-timer" style="display:none;">
                    <i class="fa-regular fa-clock"></i>
                    <span>00:00:00</span>
                </div>
            </div>
        </div>
    </div>

    <div id="meetingRequestModal" class="meeting-modal">

        <div class="meeting-modal-content">

            <h3>
                <i class="fa-solid fa-video"></i>
                Meeting Invitation
            </h3>

            <p id="meetingRequestText"></p>

            <button id="acceptMeetingBtn">
                Accept
            </button>

            <button id="declineMeetingBtn">
                Decline
            </button>

        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>

</body>

</html>
